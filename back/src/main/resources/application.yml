spring:
  mail:
    host: youprono_maildev
    port: 1025
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/youprono_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        "[format_sql]": true
        "[show_sql]": true
        jdbc:
          "[batch_size]": 50
        "[order_inserts]": true
        "[order_updates]": true

  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/youprono_conversations}
      auto-index-creation: true

  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
      exclude: static/**,public/**,templates/**
    livereload:
      enabled: true

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    "[org.springframework.boot.autoconfigure]": warn


api-sports:
  key: ${API_SPORTS_KEY}
  basketball:
    url: ${API_SPORTS_BASKETBALL_URL}

scheduling:
  cron:
    fetch-matches: ${CRON_FETCH_MATCHES}
    fetch-teams: ${CRON_FETCH_TEAMS}

