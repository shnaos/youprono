version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: youprono_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
  pgadmin:
    image: dpage/pgadmin4
    container_name: youprono_pgadmin
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped
  mongo:
    image: mongo:6
    container_name: youprono_mongo
    env_file:
      - .env
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    restart: unless-stopped
  mongo-express:
    image: mongo-express
    container_name: youprono_mongo_express
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD}
    ports:
      - "8081:8081"
    depends_on:
      - mongo
    restart: unless-stopped
  fake-smtp:
    image: maildev/maildev
    container_name: youprono_maildev
    ports:
      - "1080:1080" # Interface web
      - "1025:1025" # Port SMTP
    restart: unless-stopped
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: youprono_api
    env_file:
      - .env
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    depends_on:
      - postgres
      - mongo
    environment:
      SPRING_PROFILES_ACTIVE: dev
      POSTGRES_URL: ${POSTGRES_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MONGO_URI: ${MONGO_URI}
      SERVER_PORT: ${SERVER_PORT}
      API_SPORTS_KEY: ${API_SPORTS_KEY}
      API_SPORTS_BASKETBALL_URL: ${API_SPORTS_BASKETBALL_URL}
      
    volumes:
      - ./src:/app/src

volumes:
  pgdata:
  mongodata:
  pgadmin_data:
